<div style="max-width: {max_width}px;">
  <iframe
    src="https://player.vimeo.com/video/{video_id}"
    width="{width}"
    height="{height}"
    frameborder="0"
    allow="
      autoplay;
      fullscreen;
      picture-in-picture;
      clipboard-write;
      encrypted-media;
      web-share;
    "
    referrerpolicy="strict-origin-when-cross-origin"
    title="{title}"
    allowfullscreen
  ></iframe>
</div>
